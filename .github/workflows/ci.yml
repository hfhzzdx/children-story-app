name: Android CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:  # 允许手动触发
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release

env:
  ANDROID_COMPILE_SDK: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"
  ANDROID_MIN_SDK: "21"
  ANDROID_TARGET_SDK: "34"
  GRADLE_VERSION: "8.5"

jobs:
  quality-checks:
    name: 代码质量检查
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Run Kotlin linter
      run: |
        # 检查Kotlin代码规范
        echo "检查Kotlin代码规范..."
        # 这里可以集成ktlint或detekt
    
    - name: Check Gradle dependencies
      run: |
        chmod +x ./gradlew
        ./gradlew dependencies --configuration debugCompileClasspath

  build:
    name: 构建APK
    runs-on: ubuntu-latest
    needs: [quality-checks]
    
    strategy:
      matrix:
        variant: [debug, release]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept Android SDK licenses
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
    
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Build APK
      run: |
        if [ "${{ matrix.variant }}" = "release" ]; then
          ./gradlew assembleRelease
        else
          ./gradlew assembleDebug
        fi
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ matrix.variant }}-apk
        path: |
          app/build/outputs/apk/${{ matrix.variant }}/*.apk
          app/build/outputs/bundle/${{ matrix.variant }}/*.aab
        retention-days: 30
    
    - name: Upload mapping file (release only)
      if: matrix.variant == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: mapping-files
        path: app/build/outputs/mapping/release/
        retention-days: 90

  test:
    name: 运行测试
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Run unit tests
      run: ./gradlew testDebugUnitTest
    
    - name: Run instrumented tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        script: ./gradlew connectedDebugAndroidTest
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          app/build/reports/tests/
          app/build/outputs/androidTest-results/
        retention-days: 30

  security-scan:
    name: 安全扫描
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run MobSF scan
      uses: mobsf/mobsfscan-action@main
      with:
        sarif: true
    
    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: mobsfscan_report.sarif
        retention-days: 90

  deploy:
    name: 部署
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download APK artifact
      uses: actions/download-artifact@v4
      with:
        name: app-release-apk
        path: ./artifacts
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./artifacts/*.apk
        generate_release_notes: true
    
    - name: Deploy to Firebase App Distribution
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: ${{ secrets.FIREBASE_APP_ID }}
        token: ${{ secrets.FIREBASE_TOKEN }}
        groups: testers
        file: ./artifacts/*.apk

  notify:
    name: 通知
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    

  monitor:
    name: 监控
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Upload workflow metrics
      uses: actions/upload-artifact@v4
      with:
        name: workflow-metrics
        path: ${{ github.workspace }}/.github/workflows/metrics.json
        retention-days: 90
